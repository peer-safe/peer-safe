name: Build Dapp

on:
  push:
   branches:
    - master
  workflow_dispatch:

jobs:
  build:
   runs-on: ubuntu-latest
   name: Build and Push
   steps:
    - name: git-checkout
      uses: actions/checkout@v2
      with:
        lfs: true
    
    - name: Install dependencies
      run: |
        npm install -g yarn
        cd frontend
        yarn install
    
    - name: Build
      run: yarn run build

    - name: Touch CNAME
      run: echo "peersafe.tech" > build/CNAME
      
    - name: Push
      uses: s0/git-publish-subdir-action@develop
      env:
        REPO: self
        BRANCH: build
        FOLDER: build
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        MESSAGE: "Build: ({sha}) {msg}"
